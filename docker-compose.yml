name: wuland

services:
  wuland-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: wuland-server:latest
    container_name: wuland-server
    restart: unless-stopped
    ports:
      - "${WULAND_SERVER_PORT:-2567}:2567"
    environment:
      NODE_ENV: production
      PORT: 2567
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-https://wuland.bekulov.com}"
      OFFLINE_PLAYER_TTL_HOURS: "${OFFLINE_PLAYER_TTL_HOURS:-168}"
      CLEAR_PLAYER_STORE_ON_START: "${CLEAR_PLAYER_STORE_ON_START:-false}"
      ENEMY_AI_PAUSED: "${ENEMY_AI_PAUSED:-false}"
      GOD_MODE_ENABLED: "${GOD_MODE_ENABLED:-true}"
      GOD_MODE_CODE: "${GOD_MODE_CODE:-}"
    volumes:
      - ./server/data:/app/server/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:2567/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: wuland-tunnel
    restart: unless-stopped
    depends_on:
      - wuland-server
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in .env}
