name: wuland

services:
  wuland-server:
    # Pinned to this build so Synology is forced to pull the cleanup version
    # instead of reusing an older cached "latest" image.
    image: ghcr.io/kbekulov/wuland-server:053c0a725f3995c06aaecaae50cc2fb5bcb788cc
    container_name: wuland-server
    restart: unless-stopped
    ports:
      - "2567:2567"
    environment:
      NODE_ENV: production
      PORT: 2567
      ALLOWED_ORIGINS: "https://wuland.bekulov.com"
      OFFLINE_PLAYER_TTL_HOURS: 168
      # One-time cleanup requested on 2026-04-28. Set this back to "false"
      # after the live world is clean if you want sleeping players to persist.
      CLEAR_PLAYER_STORE_ON_START: "true"
      # Temporary prototype setting: enemies remain visible/attackable but do
      # not wander, chase, or deal contact damage.
      ENEMY_AI_PAUSED: "true"
    volumes:
      - wuland-player-data:/app/server/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:2567/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: wuland-tunnel
    restart: unless-stopped
    depends_on:
      - wuland-server
    command: tunnel --no-autoupdate run --token PASTE_YOUR_CLOUDFLARE_TUNNEL_TOKEN_HERE

volumes:
  wuland-player-data:
